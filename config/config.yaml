embedding:
  model_name: BAAI/bge-small-en-v1.5
  batch_size: 32

store:
  location: ":memory:"      # set url: http://localhost:6333 for persistence
  collection: eih_chunks

retrieval:
  dense_top_k: 20
  sparse_top_k: 20
  rrf_k: 60
  rerank_top_n: 5
  use_reranker: true
  reranker_model: BAAI/bge-reranker-base

llm:
  provider: auto            # auto -> groq if GROQ_API_KEY, else ollama, else echo
  ollama_model: qwen2.5:7b
  groq_model: llama-3.3-70b-versatile
  temperature: 0.1
  max_tokens: 800

chunking:
  doc_max_chars: 1200
  doc_overlap_chars: 150
  code_max_chars: 1600
